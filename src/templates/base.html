<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>{{ app_name }} &mdash; {{ app_tagline }}</title>
    <script>
      (function () {
        try {
          if (localStorage.getItem("sp_sidebar_collapsed") === "true") {
            document.documentElement.setAttribute("data-sidebar-collapsed", "true");
          }
        } catch (e) {
          // ignore storage access failures
        }
      })();
    </script>

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
      integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH"
      crossorigin="anonymous"
    />
    <link rel="stylesheet" href="{{ url_for('static', filename='app.css') }}" />
  </head>
  <body>
    <div class="app-shell">
      <aside class="app-sidebar" id="app-sidebar">
        <div class="app-brand">
          <div class="app-brand-text">
            <div class="app-brand-name">{{ app_name }}</div>
            <div class="app-brand-tagline">{{ app_tagline }}</div>
            <div class="app-brand-compact" aria-hidden="true">BE</div>
          </div>
          <button
            id="sidebar-toggle"
            class="app-sidebar-toggle"
            type="button"
            aria-controls="app-sidebar"
            aria-expanded="true"
            aria-label="Collapse sidebar"
          >
            <span aria-hidden="true">&#9776;</span>
          </button>
        </div>
        <nav class="app-nav" aria-label="Primary">
          <a
            class="app-nav-link {% if request.path == '/' %}active{% endif %}"
            href="{{ url_for('index') }}"
            aria-current="{% if request.path == '/' %}page{% else %}false{% endif %}"
            aria-label="Workspace"
          >
            <span class="app-nav-icon" aria-hidden="true">W</span>
            <span class="app-nav-label">Workspace</span>
          </a>
          <a
            class="app-nav-link {% if request.path == '/docs' %}active{% endif %}"
            href="{{ url_for('docs') }}"
            aria-current="{% if request.path == '/docs' %}page{% else %}false{% endif %}"
            aria-label="Docs"
          >
            <span class="app-nav-icon" aria-hidden="true">D</span>
            <span class="app-nav-label">Docs</span>
          </a>
        </nav>
        <div class="app-sidebar-footer">
          <span class="badge text-bg-light border">Tool-integrated</span>
        </div>
      </aside>

      <div class="app-main">
        <main class="py-4 app-content">
          <div class="container">
            {% block content %}{% endblock %}
          </div>
        </main>
      </div>
    </div>

    <script
      src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"
      integrity="sha384-YvpcrYf0tY3lHB60NNkmXc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz"
      crossorigin="anonymous"
    ></script>
    <script src="{{ url_for('static', filename='sidebar_controls.js') }}"></script>
  </body>
</html>
