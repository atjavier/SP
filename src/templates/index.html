{% extends "base.html" %}

{% block content %}
  <div class="row g-4">
    <div class="col-12 col-lg-5">
      <section id="upload-section" class="card shadow-sm">
        <div class="card-body">
          <h2 class="h5 mb-3">Upload</h2>

          <form>
            <div class="mb-3">
              <label for="vcf-file" class="form-label">VCF file</label>
              <input
                id="vcf-file"
                name="vcf_file"
                class="form-control"
                type="file"
                accept=".vcf,.vcf.gz"
                aria-describedby="vcf-file-help"
              />
              <div id="vcf-file-help" class="form-text">
                Upload a VCF for the current run and validate it before starting the pipeline.
              </div>
            </div>

            <button id="upload-validate-btn" class="btn btn-primary" type="button">
              Upload &amp; Validate
            </button>
          </form>

          <div id="upload-validation-message" class="mt-3" role="status" aria-live="polite"></div>
          <div id="upload-validation-results" class="mt-2"></div>
        </div>
      </section>
    </div>

    <div class="col-12 col-lg-7">
      <div class="d-grid gap-4">
        <section id="run-status-section" class="card shadow-sm">
          <div class="card-body">
            <h2 class="h5 mb-3">Run Status</h2>
            <div class="d-flex flex-wrap gap-2 mb-3">
              <button id="new-run-btn" class="btn btn-sm btn-outline-primary" type="button">
                New run
              </button>
              <button
                id="cancel-run-btn"
                class="btn btn-sm btn-outline-danger"
                type="button"
                disabled
              >
                Cancel run
              </button>
            </div>

            <dl class="row gy-1 mb-0 small">
              <dt class="col-3 text-secondary">Run ID</dt>
              <dd class="col-9 mb-0"><code id="current-run-id">&mdash;</code></dd>

              <dt class="col-3 text-secondary">Status</dt>
              <dd class="col-9 mb-0">
                <span id="current-run-status" class="text-secondary">No run</span>
              </dd>

              <dt class="col-3 text-secondary">Reference build</dt>
              <dd class="col-9 mb-0"><code id="current-run-reference-build">&mdash;</code></dd>
            </dl>

            <div id="run-status-message" class="mt-3" role="status" aria-live="polite"></div>
          </div>
        </section>

        <section id="results-section" class="card shadow-sm">
          <div class="card-body">
            <h2 class="h5 mb-3">Results</h2>
            <div class="alert alert-info mb-0" role="status">
              Final results are locked until Reporting succeeds.
            </div>
          </div>
        </section>
      </div>
    </div>
  </div>

  <script src="{{ url_for('static', filename='run_controls.js') }}"></script>
  <script src="{{ url_for('static', filename='upload_controls.js') }}"></script>
{% endblock %}
